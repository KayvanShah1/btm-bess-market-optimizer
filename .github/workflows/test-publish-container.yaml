name: Test, Build Image and Deploy to Render

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    packages: write
    deployments: write

env:
    PYTHON_VERSION: "3.12"

jobs:
    test:
        name: Test and lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Install uv
              uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
              with:
                  enable-cache: true

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dependencies
              run: uv sync --all-packages --dev

            - name: Run lint
              run: uv run ruff check .

    docker-build-publish:
        name: Build and publish GHCR image
        runs-on: ubuntu-latest
        needs:
            - test

        env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GitHub Container Registry
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=branch

            - name: Build and optionally publish image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  push:
                      ${{ github.event_name == 'push' && github.ref ==
                      'refs/heads/main' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy-to-render:
        name: Deploy to Render
        runs-on: ubuntu-latest
        needs:
            - docker-build-publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Deploy to Render
              uses: JorgeLNJunior/render-deploy@v1.5.0
              with:
                  service_id: ${{ secrets.RENDER_SERVICE_ID }}
                  api_key: ${{ secrets.RENDER_API_KEY }}
                  github_deployment: true
                  deployment_environment: "render"
                  github_token: ${{ secrets.GITHUB_TOKEN }}
